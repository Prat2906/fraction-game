<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraction Pizza Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ffe8c7,#ffb4a2);
margin:0;
padding:10px;
}

.container{
width:260px;
margin:auto;
}

h1{
color:#c1121f;
font-size:22px;
margin:5px;
}

#score{
font-size:16px;
margin:5px;
}

#question{
font-size:18px;
margin:10px 0;
}

#pizza{
width:150px;
height:150px;
margin:10px auto;
border-radius:50%;
position:relative;
background:#f4a261;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

.slice{
position:absolute;
width:50%;
height:50%;
background:#ffd166;
border:2px solid #e76f51;
transform-origin:100% 100%;
cursor:pointer;
}

.selected{
background:#ef476f !important;
}

.pepperoni{
width:8px;
height:8px;
background:#b22222;
border-radius:50%;
position:absolute;
}

#result{
font-size:16px;
margin-top:5px;
font-weight:bold;
}

button{
padding:6px 12px;
font-size:14px;
border:none;
background:#2a9d8f;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#21867a;
}

</style>
</head>

<body>

<div class="container">

<h1>🍕 Fraction Pizza</h1>

<div id="score">Score: 0</div>

<div id="question"></div>

<div id="pizza"></div>

<button onclick="newQuestion()">Next Pizza</button>

<div id="result"></div>

</div>

<script>

let totalSlices;
let correctSlices;
let score=0;

const pizza=document.getElementById("pizza");

function playCorrect(){
new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3").play();
}

function playWrong(){
new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-950.mp3").play();
}

function addPepperoni(slice){

for(let i=0;i<2;i++){

let pep=document.createElement("div");
pep.className="pepperoni";

pep.style.top=(Math.random()*70+10)+"%";
pep.style.left=(Math.random()*70+10)+"%";

slice.appendChild(pep);

}

}

function createPizza(){

pizza.innerHTML="";

for(let i=0;i<totalSlices;i++){

let slice=document.createElement("div");
slice.className="slice";

let angle=(360/totalSlices)*i;

slice.style.transform="rotate("+angle+"deg) skewY("+(90-360/totalSlices)+"deg)";

slice.onclick=function(){
selectSlice(this);
};

addPepperoni(slice);

pizza.appendChild(slice);

}

}

let selected=[];

function selectSlice(slice){

slice.classList.add("selected");

selected.push(slice);

if(selected.length===correctSlices){

document.getElementById("result").innerHTML="✅ Correct!";
playCorrect();

score++;
document.getElementById("score").innerHTML="Score: "+score;

setTimeout(newQuestion,1200);

}

else if(selected.length>correctSlices){

document.getElementById("result").innerHTML="❌ Too many slices!";
playWrong();

score=0;
document.getElementById("score").innerHTML="Score: "+score;

setTimeout(newQuestion,1200);

}

}

function newQuestion(){

selected=[];
document.getElementById("result").innerHTML="";

totalSlices=[4,6,8][Math.floor(Math.random()*3)];
correctSlices=Math.floor(Math.random()*totalSlices)+1;

document.getElementById("question").innerHTML=
"Select <b>"+correctSlices+"/"+totalSlices+"</b>";

createPizza();

}

newQuestion();

</script>

</body>
</html>
