<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraction Pizza Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ffe8c7,#ffb4a2);
margin:0;
padding:10px;
}

h1{
color:#c1121f;
}

#score{
font-size:20px;
margin-top:5px;
color:#333;
}

#question{
font-size:24px;
margin-top:10px;
margin-bottom:10px;
}

#pizza{
width:260px;
height:260px;
margin:20px auto;
border-radius:50%;
position:relative;
background:#f4a261;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.slice{
position:absolute;
width:50%;
height:50%;
background:#ffd166;
border:2px solid #e76f51;
transform-origin:100% 100%;
cursor:pointer;
transition:0.3s;
}

.slice:hover{
filter:brightness(1.1);
}

.selected{
background:#ef476f !important;
animation:pop 0.2s;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.pepperoni{
width:16px;
height:16px;
background:#b22222;
border-radius:50%;
position:absolute;
}

#result{
font-size:22px;
margin-top:10px;
font-weight:bold;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
background:#2a9d8f;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#21867a;
}

</style>
</head>

<body>

<h1>🍕 Fraction Pizza Game</h1>

<div id="score">Score: 0</div>

<div id="question"></div>

<div id="pizza"></div>

<button onclick="newQuestion()">Next Pizza</button>

<div id="result"></div>

<script>

let totalSlices;
let correctSlices;
let score=0;

const pizza=document.getElementById("pizza");

function playCorrect(){
new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0a4c.mp3").play();
}

function playWrong(){
new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_cedb7c1e1c.mp3").play();
}

function addPepperoni(slice){

for(let i=0;i<2;i++){

let pep=document.createElement("div");
pep.className="pepperoni";

pep.style.top=(Math.random()*60+20)+"%";
pep.style.left=(Math.random()*60+20)+"%";

slice.appendChild(pep);

}

}

function createPizza(){

pizza.innerHTML="";

for(let i=0;i<totalSlices;i++){

let slice=document.createElement("div");
slice.className="slice";

let angle=(360/totalSlices)*i;

slice.style.transform=
"rotate("+angle+"deg) skewY("+(90-360/totalSlices)+"deg)";

slice.onclick=function(){
selectSlice(this);
};

addPepperoni(slice);

pizza.appendChild(slice);

}

}

let selected=[];

function selectSlice(slice){

slice.classList.add("selected");

selected.push(slice);

if(selected.length===correctSlices){

document.getElementById("result").innerHTML="✅ Correct!";
playCorrect();

score++;
document.getElementById("score").innerHTML="Score: "+score;

setTimeout(newQuestion,1200);

}

else if(selected.length>correctSlices){

document.getElementById("result").innerHTML="❌ Too many slices!";
playWrong();

score=0;
document.getElementById("score").innerHTML="Score: "+score;

setTimeout(newQuestion,1200);

}

}

function newQuestion(){

selected=[];
document.getElementById("result").innerHTML="";

totalSlices=[4,6,8][Math.floor(Math.random()*3)];
correctSlices=Math.floor(Math.random()*totalSlices)+1;

document.getElementById("question").innerHTML=
"Select <b>"+correctSlices+"/"+totalSlices+"</b> of the pizza";

createPizza();

}

newQuestion();

</script>

</body>
</html>
